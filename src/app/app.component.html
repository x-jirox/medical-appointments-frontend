<!-- Mostrar solo si no está logueado -->
<app-header *ngIf="!isLoggedIn"></app-header>

<!-- Mostrar las páginas públicas -->
<router-outlet *ngIf="!isLoggedIn"></router-outlet>

<!-- Mostrar Dashboard solo si está logueado -->
<app-dashboard *ngIf="isLoggedIn"></app-dashboard>

<!-- Mostrar Footer solo si no está logueado -->
<app-footer *ngIf="!isLoggedIn"></app-footer>
